name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          # 临时移走所有构建文件，避免系统 Gradle 9.x 加载 AGP 7.2.1 和 AIDE Pro 无效路径
          mv build.gradle build.gradle.bak
          mv settings.gradle settings.gradle.bak
          mv gradle.properties gradle.properties.bak
          gradle wrapper --gradle-version 7.5.1
          mv build.gradle.bak build.gradle
          mv settings.gradle.bak settings.gradle
          mv gradle.properties.bak gradle.properties

      - name: Fix AIDE Pro hardcoded paths for CI
        run: |
          sed -i '/^org.gradle.java.home=/d' gradle.properties
          sed -i '/^org.gradle.project.buildDir=/d' gradle.properties
          sed -i 's|^buildDir = new File.*|// buildDir: using default (overridden for CI)|' build.gradle
          sed -i 's|project.buildDir = new File.*|// project.buildDir: using default (overridden for CI)|' settings.gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Debug APK
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-toolbox-debug
          path: build/outputs/apk/debug/*.apk