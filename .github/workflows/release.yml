name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          # 在临时目录生成 wrapper，避免系统 Gradle 9.x 加载项目的 AGP 7.2.1 和 AIDE Pro 路径
          cd /tmp
          mkdir -p gradle-gen && cd gradle-gen
          echo 'rootProject.name = "temp"' > settings.gradle
          gradle wrapper --gradle-version 7.5.1
          cd "$GITHUB_WORKSPACE"
          mkdir -p gradle/wrapper
          cp /tmp/gradle-gen/gradlew /tmp/gradle-gen/gradlew.bat .
          cp /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.jar /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          rm -rf /tmp/gradle-gen

      - name: Fix AIDE Pro hardcoded paths for CI
        run: |
          sed -i '/^org.gradle.java.home=/d' gradle.properties
          sed -i '/^org.gradle.project.buildDir=/d' gradle.properties
          sed -i 's|^buildDir = new File.*|// buildDir: using default (overridden for CI)|' build.gradle
          sed -i 's|project.buildDir = new File.*|// project.buildDir: using default (overridden for CI)|' settings.gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Debug APK
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          TAG_NAME="${{ github.ref_name }}"
          cp build/outputs/apk/debug/*.apk "release/agent-toolbox-${TAG_NAME}-debug.apk"

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}